  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_metab_qc_duplicates_ui_helpers.R
  - R/mod_metab_qc_duplicates_render_helpers.R
  - R/mod_metab_qc_duplicates_server_helpers.R
  - R/mod_metab_qc_duplicates.R

entries:
  - id: mod_metab_qc_duplicates_run_resolution_observer
    source: R/mod_metab_qc_duplicates.R
    selector: { kind: symbol, value: runMetabDuplicateResolutionObserver }
    target: R/mod_metab_qc_duplicates_server_helpers.R
    group: metabolomics.qc.duplicates.wrapper.server
    note: Wave 6 stages the remaining resolve-duplicates observer wrapper helper into the existing server helper file without hand-rewriting the helper body.
