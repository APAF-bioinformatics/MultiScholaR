version: 1
wave: wave22_proteomics_enrichment_server_helpers
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_prot_enrich_server_helpers.R

entries:
  - id: mod_prot_enrich_post_process_results_capturer
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: captureProtEnrichPostProcessResults }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.analysis_body.persistence_finalization
    note: Twenty-second staged enrichment analysis-body wave moves the next exact-source persistence/finalization helper cluster without rewriting live sources.

  - id: mod_prot_enrich_analysis_results_persister
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: persistProtEnrichAnalysisResults }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.analysis_body.persistence_finalization

  - id: mod_prot_enrich_analysis_body_results_finalizer
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: finalizeProtEnrichAnalysisBodyResults }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.analysis_body.persistence_finalization
