version: 1
wave: wave5_metabolomics_import_display_status
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_metab_import_display_helpers.R
  - R/mod_metab_import_registration_helpers.R
  - R/mod_metab_import_processing_helpers.R
  - R/mod_metab_import_server_helpers.R
  - R/mod_metab_import.R

entries:
  - id: mod_metab_import_handle_assay_file_selection
    source: R/mod_metab_import.R
    selector: { kind: symbol, value: handleMetabImportAssayFileSelection }
    target: R/mod_metab_import_display_helpers.R
    group: metabolomics.import.wrapper.display_status_cluster
    note: Wave 5 stages the remaining metabolomics import display/status helper cluster into one dedicated helper file without rewriting live sources until the reviewed apply checkpoint.

  - id: mod_metab_import_build_format_detection_status
    source: R/mod_metab_import.R
    selector: { kind: symbol, value: buildMetabImportFormatDetectionStatus }
    target: R/mod_metab_import_display_helpers.R
    group: metabolomics.import.wrapper.display_status_cluster

  - id: mod_metab_import_build_metabolite_id_status
    source: R/mod_metab_import.R
    selector: { kind: symbol, value: buildMetabImportMetaboliteIdStatus }
    target: R/mod_metab_import_display_helpers.R
    group: metabolomics.import.wrapper.display_status_cluster

  - id: mod_metab_import_build_custom_metabolite_id_status
    source: R/mod_metab_import.R
    selector: { kind: symbol, value: buildMetabImportCustomMetaboliteIdStatus }
    target: R/mod_metab_import_display_helpers.R
    group: metabolomics.import.wrapper.display_status_cluster

  - id: mod_metab_import_build_custom_annotation_status
    source: R/mod_metab_import.R
    selector: { kind: symbol, value: buildMetabImportCustomAnnotationStatus }
    target: R/mod_metab_import_display_helpers.R
    group: metabolomics.import.wrapper.display_status_cluster

  - id: mod_metab_import_build_annotation_status
    source: R/mod_metab_import.R
    selector: { kind: symbol, value: buildMetabImportAnnotationStatus }
    target: R/mod_metab_import_display_helpers.R
    group: metabolomics.import.wrapper.display_status_cluster

  - id: mod_metab_import_build_sample_columns_display
    source: R/mod_metab_import.R
    selector: { kind: symbol, value: buildMetabImportSampleColumnsDisplay }
    target: R/mod_metab_import_display_helpers.R
    group: metabolomics.import.wrapper.display_status_cluster

  - id: mod_metab_import_build_available_columns_display
    source: R/mod_metab_import.R
    selector: { kind: symbol, value: buildMetabImportAvailableColumnsDisplay }
    target: R/mod_metab_import_display_helpers.R
    group: metabolomics.import.wrapper.display_status_cluster

  - id: mod_metab_import_build_validation_summary
    source: R/mod_metab_import.R
    selector: { kind: symbol, value: buildMetabImportValidationSummary }
    target: R/mod_metab_import_display_helpers.R
    group: metabolomics.import.wrapper.display_status_cluster

  - id: mod_metab_import_build_status
    source: R/mod_metab_import.R
    selector: { kind: symbol, value: buildMetabImportStatus }
    target: R/mod_metab_import_display_helpers.R
    group: metabolomics.import.wrapper.display_status_cluster
    note: Keep the file-selection, validation, and status-render helper cluster together so the staged helper remains a clean dependency for the already-live registration and server helper files.
