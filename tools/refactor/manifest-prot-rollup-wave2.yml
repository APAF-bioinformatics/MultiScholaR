version: 1
wave: wave2_proteomics_rollup_methods
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/func_prot_rollup_methods.R

entries:
  - id: prot_rollup_precursor_to_peptide_helper
    source: R/func_prot_rollup.R
    selector: { kind: symbol, value: rollUpPrecursorToPeptideHelper }
    target: R/func_prot_rollup_methods.R
    group: proteomics.rollup.methods
    note: Second staged rollup wave moves the remaining precursor-to-peptide helper and S4 method shell into a dedicated rollup methods file while leaving func_prot_rollup.R as the public breadcrumb wrapper.

  - id: prot_rollup_precursor_to_peptide_method
    source: R/func_prot_rollup.R
    selector: { kind: setMethod, value: rollUpPrecursorToPeptide }
    target: R/func_prot_rollup_methods.R
    group: proteomics.rollup.methods
