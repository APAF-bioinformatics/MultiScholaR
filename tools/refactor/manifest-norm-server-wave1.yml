version: 1
wave: wave1_proteomics_norm_server_qc_helpers
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_prot_norm_qc_support_helpers.R
  - R/mod_prot_norm_qc_generation_helpers.R

entries:
  - id: mod_prot_norm_qc_image_payload
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: buildProtNormQcImagePayload }
    target: R/mod_prot_norm_qc_support_helpers.R
    group: proteomics.norm.wrapper.qc_support
    note: First normalization wrapper wave stages the seam-ready QC helper cluster.

  - id: mod_prot_norm_filtering_summary_text
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: getProtNormFilteringSummaryText }
    target: R/mod_prot_norm_qc_support_helpers.R
    group: proteomics.norm.wrapper.qc_support

  - id: mod_prot_norm_ruv_summary
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: buildProtNormRuvOptimizationSummary }
    target: R/mod_prot_norm_qc_support_helpers.R
    group: proteomics.norm.wrapper.qc_support

  - id: mod_prot_norm_optimization_table
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: prepareProtNormOptimizationResultsTable }
    target: R/mod_prot_norm_qc_support_helpers.R
    group: proteomics.norm.wrapper.qc_support

  - id: mod_prot_norm_final_qc_state
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: resolveProtNormFinalQcRenderState }
    target: R/mod_prot_norm_qc_support_helpers.R
