    selector: { kind: symbol, value: setupMetabImportAnnotationStatusOutput }
    target: R/mod_metab_import_registration_helpers.R
    group: metabolomics.import.wrapper.registration_cluster

  - id: mod_metab_import_setup_sample_columns_display_output
    source: R/mod_metab_import.R
    selector: { kind: symbol, value: setupMetabImportSampleColumnsDisplayOutput }
    target: R/mod_metab_import_registration_helpers.R
