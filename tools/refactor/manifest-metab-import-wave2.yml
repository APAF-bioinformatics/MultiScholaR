    selector: { kind: symbol, value: setupMetabImportValidationSummaryOutput }
    target: R/mod_metab_import_registration_helpers.R
    group: metabolomics.import.wrapper.registration_cluster

  - id: mod_metab_import_setup_format_detection_status_output
    source: R/mod_metab_import.R
    selector: { kind: symbol, value: setupMetabImportFormatDetectionStatusOutput }
    target: R/mod_metab_import_registration_helpers.R
    group: metabolomics.import.wrapper.registration_cluster

  - id: mod_metab_import_setup_metabolite_id_status_output
    source: R/mod_metab_import.R
    selector: { kind: symbol, value: setupMetabImportMetaboliteIdStatusOutput }
    target: R/mod_metab_import_registration_helpers.R
    group: metabolomics.import.wrapper.registration_cluster

  - id: mod_metab_import_setup_annotation_status_output
