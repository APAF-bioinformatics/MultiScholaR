version: 1
wave: wave1_lipidomics_da_core_helpers
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/func_lipid_da_model.R
  - R/func_lipid_da_results.R

entries:
  - id: lipid_da_run_tests_contrasts
    source: R/func_lipid_da.R
    selector: { kind: symbol, value: runTestsContrastsLipidDA }
    target: R/func_lipid_da_model.R
    group: lipidomics.da.model
    note: First staged lipid-DA wave lifts the characterization-covered limma runner and long-format wrapper helpers without touching live plotting or export code.

  - id: lipid_da_run_wrapper
    source: R/func_lipid_da.R
    selector: { kind: symbol, value: runLipidsDA }
    target: R/func_lipid_da_model.R
    group: lipidomics.da.model

  - id: lipid_da_long_format
    source: R/func_lipid_da.R
    selector: { kind: symbol, value: createLipidDaResultsLongFormat }
    target: R/func_lipid_da_results.R
    group: lipidomics.da.results
