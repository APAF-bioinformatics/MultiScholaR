version: 1
wave: wave3_proteomics_enrichment_server_helpers
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_prot_enrich_server_helpers.R

entries:
  - id: mod_prot_enrich_run_observer_setup
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: setupProtEnrichRunObserverRegistration }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration_setup
    note: Third staged enrichment wrapper wave moves the adjacent run-observer and enrichment-output registration helpers without rewriting live sources.

  - id: mod_prot_enrich_gprofiler_results_table_setup
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: setupProtEnrichGprofilerResultsTableOutputRegistration }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration_setup

  - id: mod_prot_enrich_gprofiler_summary_setup
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: setupProtEnrichGprofilerSummaryOutputRegistration }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration_setup

  - id: mod_prot_enrich_cluster_profiler_results_table_setup
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: setupProtEnrichClusterProfilerResultsTableOutputRegistration }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration_setup
