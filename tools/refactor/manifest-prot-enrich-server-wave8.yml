version: 1
wave: wave8_proteomics_enrichment_server_helpers
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_prot_enrich_server_helpers.R

entries:
  - id: mod_prot_enrich_analysis_method_display_output_register
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: registerProtEnrichAnalysisMethodDisplayOutput }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration
    note: Eighth staged enrichment wrapper wave moves the next adjacent registration and observer cluster without rewriting live sources.

  - id: mod_prot_enrich_taxon_id_observer_register
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: registerProtEnrichTaxonIdObserver }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration

  - id: mod_prot_enrich_mixed_species_observer_register
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: registerProtEnrichMixedSpeciesObserver }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration

  - id: mod_prot_enrich_contrasts_display_output_register
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: registerProtEnrichContrastsDisplayOutput }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration
