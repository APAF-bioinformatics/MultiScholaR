version: 1
wave: wave3_metabolomics_norm_module_export_workflow_helpers
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_metab_norm_server_helpers.R

entries:
  - id: mod_metab_norm_resolve_export_source_dir
    source: R/mod_metab_norm.R
    selector: { kind: symbol, value: resolveMetabNormExportSourceDir }
    target: R/mod_metab_norm_server_helpers.R
    group: metabolomics.norm.module.export_workflow
    note: Third metabolomics normalization module server wave stages the remaining export-session builder and writer workflow support cluster after the observer-shell apply.

  - id: mod_metab_norm_collect_feature_counts_per_assay
    source: R/mod_metab_norm.R
    selector: { kind: symbol, value: collectMetabNormFeatureCountsPerAssay }
    target: R/mod_metab_norm_server_helpers.R
    group: metabolomics.norm.module.export_workflow

  - id: mod_metab_norm_build_export_session_data
    source: R/mod_metab_norm.R
    selector: { kind: symbol, value: buildMetabNormExportSessionData }
    target: R/mod_metab_norm_server_helpers.R
    group: metabolomics.norm.module.export_workflow

  - id: mod_metab_norm_save_export_session_rds_files
    source: R/mod_metab_norm.R
    selector: { kind: symbol, value: saveMetabNormExportSessionRdsFiles }
    target: R/mod_metab_norm_server_helpers.R
    group: metabolomics.norm.module.export_workflow

  - id: mod_metab_norm_save_export_metadata_files
    source: R/mod_metab_norm.R
    selector: { kind: symbol, value: saveMetabNormExportMetadataFiles }
    target: R/mod_metab_norm_server_helpers.R
    group: metabolomics.norm.module.export_workflow

  - id: mod_metab_norm_save_export_summary_file
    source: R/mod_metab_norm.R
    selector: { kind: symbol, value: saveMetabNormExportSummaryFile }
    target: R/mod_metab_norm_server_helpers.R
    group: metabolomics.norm.module.export_workflow

  - id: mod_metab_norm_run_export_session_workflow
    source: R/mod_metab_norm.R
    selector: { kind: symbol, value: runMetabNormExportSessionWorkflow }
    target: R/mod_metab_norm_server_helpers.R
    group: metabolomics.norm.module.export_workflow
