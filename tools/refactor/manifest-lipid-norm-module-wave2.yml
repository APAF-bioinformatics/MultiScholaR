    group: lipidomics.norm.wrapper.workflow
    note: Second staged lipid-normalization module wave lifts the remaining workflow handlers, runtime orchestration, and public wrapper shells into exact-source helper files while keeping the exported ui/server entrypoints live in mod_lipid_norm.R until a later reviewed apply.

