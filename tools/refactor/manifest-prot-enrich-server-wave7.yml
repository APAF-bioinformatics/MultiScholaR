version: 1
wave: wave7_proteomics_enrichment_server_helpers
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_prot_enrich_server_helpers.R

entries:
  - id: mod_prot_enrich_plot_outputs_register
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: registerProtEnrichPlotOutputs }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration
    note: Seventh staged enrichment wrapper wave moves the first post-helper register-output cluster without rewriting live sources.

  - id: mod_prot_enrich_string_db_plot_register
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: registerProtEnrichStringDbPlotOutput }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration

  - id: mod_prot_enrich_results_download_handler_register
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: registerProtEnrichResultsDownloadHandler }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration
