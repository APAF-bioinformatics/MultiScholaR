version: 1
wave: wave14_proteomics_enrichment_server_helpers
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_prot_enrich_server_helpers.R

entries:
  - id: mod_prot_enrich_status_text_formatter
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: formatProtEnrichStatusText }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.formatters
    note: Fourteenth staged enrichment wrapper wave moves the next exact-source formatter helper cluster without rewriting live sources.

  - id: mod_prot_enrich_analysis_method_text_formatter
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: formatProtEnrichAnalysisMethodText }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.formatters

  - id: mod_prot_enrich_contrasts_text_formatter
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: formatProtEnrichContrastsText }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.formatters
