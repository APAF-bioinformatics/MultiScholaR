version: 1
wave: wave1_proteomics_enrichment_server_helpers
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_prot_enrich_server_helpers.R

entries:
  - id: mod_prot_enrich_supported_organisms_setup
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: setupProtEnrichSupportedOrganismsReactive }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.reactive_setup
    note: First staged enrichment wrapper wave moves the seam-ready reactive setup helpers without rewriting live sources.

  - id: mod_prot_enrich_current_analysis_method_setup
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: setupProtEnrichCurrentAnalysisMethodReactive }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.reactive_setup

  - id: mod_prot_enrich_raw_contrast_name_setup
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: setupProtEnrichRawContrastNameReactive }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.reactive_setup
