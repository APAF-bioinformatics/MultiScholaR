    target: R/mod_prot_norm_session_helpers.R
    group: proteomics.norm.wrapper.session

  - id: mod_prot_norm_run_export_workflow
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: runProtNormExportSessionWorkflow }
    target: R/mod_prot_norm_session_helpers.R
    group: proteomics.norm.wrapper.session

  - id: mod_prot_norm_handle_export_error
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: handleProtNormExportError }
    target: R/mod_prot_norm_session_helpers.R
    group: proteomics.norm.wrapper.session

  - id: mod_prot_norm_resolve_pre_norm_state
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: resolveProtNormPreNormalizationState }
    target: R/mod_prot_norm_session_helpers.R
    group: proteomics.norm.wrapper.session

  - id: mod_prot_norm_revert_state_manager
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: revertProtNormStateManagerToPreNormalization }
    target: R/mod_prot_norm_session_helpers.R
    group: proteomics.norm.wrapper.session

  - id: mod_prot_norm_reset_reactive_state
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: resetProtNormReactiveState }
    target: R/mod_prot_norm_session_helpers.R
    group: proteomics.norm.wrapper.session

  - id: mod_prot_norm_reset_outputs
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: resetProtNormOutputs }
    target: R/mod_prot_norm_session_helpers.R
    group: proteomics.norm.wrapper.session

  - id: mod_prot_norm_reset_notification
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: buildProtNormResetNotificationMessage }
    target: R/mod_prot_norm_session_helpers.R
    group: proteomics.norm.wrapper.session

  - id: mod_prot_norm_run_reset_workflow
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: runProtNormResetWorkflow }
    target: R/mod_prot_norm_session_helpers.R
    group: proteomics.norm.wrapper.session

  - id: mod_prot_norm_handle_reset_error
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: handleProtNormResetError }
    target: R/mod_prot_norm_session_helpers.R
    group: proteomics.norm.wrapper.session
