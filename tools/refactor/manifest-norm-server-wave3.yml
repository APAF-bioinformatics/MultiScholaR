  - id: mod_prot_norm_resolve_export_source_dir
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: resolveProtNormExportSourceDir }
    target: R/mod_prot_norm_session_helpers.R
    group: proteomics.norm.wrapper.session

  - id: mod_prot_norm_collect_export_session_data
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: collectProtNormExportSessionData }
    target: R/mod_prot_norm_session_helpers.R
    group: proteomics.norm.wrapper.session

  - id: mod_prot_norm_build_export_summary
    source: R/mod_prot_norm.R
    selector: { kind: symbol, value: buildProtNormExportSummaryContent }
    target: R/mod_prot_norm_session_helpers.R
    group: proteomics.norm.wrapper.session

  - id: mod_prot_norm_save_export_metadata
    source: R/mod_prot_norm.R
