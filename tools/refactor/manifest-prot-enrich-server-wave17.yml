    group: proteomics.enrichment.wrapper.renderers
    note: Seventeenth staged enrichment wrapper wave moves the remaining exact-source render-helper cluster without rewriting live sources.

  - id: mod_prot_enrich_stringdb_results_table_renderer
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: renderProtEnrichStringDbResultsTable }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.renderers

  - id: mod_prot_enrich_stringdb_plot_renderer
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: renderProtEnrichStringDbPlot }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.renderers
