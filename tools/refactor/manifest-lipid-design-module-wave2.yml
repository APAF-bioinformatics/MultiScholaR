version: 1
wave: wave2_lipidomics_design_module_entrypoints
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_lipid_design_preview_helpers.R
  - R/mod_lipid_design_builder_helpers.R
  - R/mod_lipid_design_import_helpers.R
  - R/mod_lipid_design_ui.R
  - R/mod_lipid_design_server.R
  - R/mod_lipid_design.R

entries:
  - id: mod_lipid_design_ui_entrypoint
    source: R/mod_lipid_design.R
    selector: { kind: symbol, value: mod_lipid_design_ui }
    target: R/mod_lipid_design_ui.R
    group: lipidomics.design.wrapper.entrypoints
    note: Second host-wrapper staging wave mirrors the reviewed builder entrypoint split by staging the remaining public UI and server entrypoints into dedicated files while leaving mod_lipid_design.R as the wrapper identity until a later live apply.

  - id: mod_lipid_design_server_entrypoint
    source: R/mod_lipid_design.R
    selector: { kind: symbol, value: mod_lipid_design_server }
    target: R/mod_lipid_design_server.R
    group: lipidomics.design.wrapper.entrypoints
