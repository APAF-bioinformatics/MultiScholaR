version: 1
wave: wave4_proteomics_enrichment_server_helpers
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_prot_enrich_server_helpers.R

entries:
  - id: mod_prot_enrich_cluster_profiler_summary_setup
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: setupProtEnrichClusterProfilerSummaryOutputRegistration }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration_setup
    note: Fourth staged enrichment wrapper wave moves the next adjacent output-registration helper cluster without rewriting live sources.

  - id: mod_prot_enrich_string_db_results_table_setup
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: setupProtEnrichStringDbResultsTableOutputRegistration }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration_setup

  - id: mod_prot_enrich_string_db_summary_setup
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: setupProtEnrichStringDbSummaryOutputRegistration }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration_setup

  - id: mod_prot_enrich_plot_outputs_setup
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: setupProtEnrichPlotOutputsRegistration }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration_setup
