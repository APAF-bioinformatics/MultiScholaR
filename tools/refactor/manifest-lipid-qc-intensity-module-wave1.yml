    selector: { kind: symbol, value: registerLipidIntensityAssayResultsOutput }
    target: R/mod_lipid_qc_intensity_server_helpers.R
    group: lipidomics.qc.intensity.wrapper.server_helpers
    note: First staged lipid-QC intensity module helper wave lifts the now seam-ready render and observer helper surface into a dedicated server-helpers file while keeping the public UI and server entrypoints live in mod_lipid_qc_intensity.R.

  - id: mod_lipid_qc_intensity_register_filter_plot_output
