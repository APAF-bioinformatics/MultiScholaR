    selector: { kind: symbol, value: registerLipidIntensityFilterPlotOutput }
    target: R/mod_lipid_qc_intensity_server_helpers.R
    group: lipidomics.qc.intensity.wrapper.server_helpers

  - id: mod_lipid_qc_intensity_register_revert_observer
    source: R/mod_lipid_qc_intensity.R
    selector: { kind: symbol, value: registerLipidIntensityRevertObserver }
    target: R/mod_lipid_qc_intensity_server_helpers.R
    group: lipidomics.qc.intensity.wrapper.server_helpers

  - id: mod_lipid_qc_intensity_register_apply_filter_observer
    source: R/mod_lipid_qc_intensity.R
    selector: { kind: symbol, value: registerLipidIntensityApplyFilterObserver }
    target: R/mod_lipid_qc_intensity_server_helpers.R
