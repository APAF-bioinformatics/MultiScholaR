version: 1
wave: wave5_proteomics_enrichment_server_helpers
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_prot_enrich_server_helpers.R

entries:
  - id: mod_prot_enrich_string_db_plot_setup
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: setupProtEnrichStringDbPlotOutputRegistration }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration_setup
    note: Fifth staged enrichment wrapper wave moves the remaining adjacent output-registration helper cluster without rewriting live sources.

  - id: mod_prot_enrich_analysis_method_display_setup
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: setupProtEnrichAnalysisMethodDisplayOutputRegistration }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration_setup

  - id: mod_prot_enrich_results_download_handler_setup
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: setupProtEnrichResultsDownloadHandlerRegistration }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.registration_setup
