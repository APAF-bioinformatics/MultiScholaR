version: 1
wave: wave3_lipidomics_da_module_entrypoints
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_lipid_da_display_helpers.R
  - R/mod_lipid_da_results_helpers.R
  - R/mod_lipid_da_session_helpers.R
  - R/mod_lipid_da_analysis_helpers.R
  - R/mod_lipid_da_export_helpers.R
  - R/mod_lipid_da_ui.R
  - R/mod_lipid_da_server.R
  - R/mod_lipid_da.R

entries:
  - id: mod_lipid_da_ui_entrypoint
    source: R/mod_lipid_da.R
    selector: { kind: symbol, value: mod_lipid_da_ui }
    target: R/mod_lipid_da_ui.R
    group: lipidomics.da.wrapper.entrypoints
    note: Final lipid-DA module wave stages the two public entrypoints into dedicated files and leaves mod_lipid_da.R as an explicit breadcrumb only after a later live apply.

  - id: mod_lipid_da_server_entrypoint
    source: R/mod_lipid_da.R
    selector: { kind: symbol, value: mod_lipid_da_server }
    target: R/mod_lipid_da_server.R
    group: lipidomics.da.wrapper.entrypoints
