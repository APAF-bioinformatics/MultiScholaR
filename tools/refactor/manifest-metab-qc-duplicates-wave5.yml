version: 1
wave: wave5_metabolomics_qc_duplicates_resolution_workflow_helper
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_metab_qc_duplicates_ui_helpers.R
  - R/mod_metab_qc_duplicates_render_helpers.R
  - R/mod_metab_qc_duplicates_server_helpers.R
  - R/mod_metab_qc_duplicates.R

entries:
  - id: mod_metab_qc_duplicates_run_resolution_workflow
    source: R/mod_metab_qc_duplicates.R
    selector: { kind: symbol, value: runMetabDuplicateResolutionWorkflow }
    target: R/mod_metab_qc_duplicates_server_helpers.R
    group: metabolomics.qc.duplicates.wrapper.server
    note: Wave 5 stages the remaining duplicate-resolution workflow helper into the existing server helper file without hand-rewriting the helper body.
