version: 1
wave: wave3_proteomics_import_server_entrypoints
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_prot_import_ui.R
  - R/mod_prot_import_server.R

entries:
  - id: mod_prot_import_ui_entrypoint
    source: R/mod_prot_import.R
    selector: { kind: symbol, value: mod_prot_import_ui }
    target: R/mod_prot_import_ui.R
    group: proteomics.import.wrapper.entrypoints
    note: Final wrapper wave moves the two public entry points into dedicated files and leaves mod_prot_import.R as an explicit breadcrumb.

  - id: mod_prot_import_server_entrypoint
    source: R/mod_prot_import.R
    selector: { kind: symbol, value: mod_prot_import_server }
    target: R/mod_prot_import_server.R
    group: proteomics.import.wrapper.entrypoints
