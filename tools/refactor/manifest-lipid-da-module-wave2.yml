version: 1
wave: wave2_lipidomics_da_module_session_analysis_helpers
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_lipid_da_display_helpers.R
  - R/mod_lipid_da_results_helpers.R
  - R/mod_lipid_da_session_helpers.R
  - R/mod_lipid_da_analysis_helpers.R
  - R/mod_lipid_da_export_helpers.R
  - R/mod_lipid_da.R

entries:
  - id: mod_lipid_da_restore_contrasts_from_session
    source: R/mod_lipid_da.R
    selector: { kind: symbol, value: restoreLipidDaContrastsFromSession }
    target: R/mod_lipid_da_session_helpers.R
    group: lipidomics.da.wrapper.session
    note: Second staged lipid-DA module wave lifts the remaining session/load-analysis/save-heatmap helper cluster into dedicated wrapper helper files while keeping the public module UI/server entrypoints live in mod_lipid_da.R.

  - id: mod_lipid_da_restore_assays_from_session
    source: R/mod_lipid_da.R
    selector: { kind: symbol, value: restoreLipidDaAssaysFromSession }
    target: R/mod_lipid_da_session_helpers.R
    group: lipidomics.da.wrapper.session

  - id: mod_lipid_da_restore_formula_from_session
