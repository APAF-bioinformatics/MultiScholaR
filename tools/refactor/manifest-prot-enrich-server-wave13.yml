version: 1
wave: wave13_proteomics_enrichment_server_helpers
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_prot_enrich_server_helpers.R

entries:
  - id: mod_prot_enrich_supported_organisms_table
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: buildProtEnrichSupportedOrganisms }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.analysis_method
    note: Thirteenth staged enrichment wrapper wave moves the next exact-source analysis-method helper cluster without rewriting live sources.

  - id: mod_prot_enrich_supported_organisms_reactive
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: createProtEnrichSupportedOrganismsReactive }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.analysis_method

  - id: mod_prot_enrich_analysis_method_resolution
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: resolveProtEnrichAnalysisMethod }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.analysis_method

  - id: mod_prot_enrich_current_analysis_method_reactive
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: createProtEnrichCurrentAnalysisMethodReactive }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.analysis_method
