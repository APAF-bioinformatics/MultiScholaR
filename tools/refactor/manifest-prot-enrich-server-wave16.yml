version: 1
wave: wave16_proteomics_enrichment_server_helpers
source_root: R
collate_mode: explicit

defaults:
  action: extract
  preserve:
    roxygen: true
    comments: true
    whitespace: true

collate_targets:
  - R/mod_prot_enrich_server_helpers.R

entries:
  - id: mod_prot_enrich_gprofiler_results_table_renderer
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: renderProtEnrichGprofilerResultsTable }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.renderers
    note: Sixteenth staged enrichment wrapper wave moves the next exact-source render-helper cluster without rewriting live sources.

  - id: mod_prot_enrich_gprofiler_plot_renderer
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: renderProtEnrichGprofilerPlot }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.renderers

  - id: mod_prot_enrich_clusterprofiler_plot_renderer
    source: R/mod_prot_enrich.R
    selector: { kind: symbol, value: renderProtEnrichClusterProfilerPlot }
    target: R/mod_prot_enrich_server_helpers.R
    group: proteomics.enrichment.wrapper.renderers
